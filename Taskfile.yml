version: "3"

vars:
  BACKEND_DIR: apps/backend
  COMPOSE_FILE: infra/compose/docker-compose.yml

tasks:
  # ── Development ──────────────────────────────────────────────
  dev:
    desc: Start the backend via docker-compose
    cmds:
      - docker compose -f {{.COMPOSE_FILE}} up --build

  dev:backend:
    desc: Start backend only with hot reload
    dir: "{{.BACKEND_DIR}}"
    cmds:
      - uv run uvicorn app.main:app --reload --host 0.0.0.0 --port 8000

  # ── Check (Claude runs this before declaring done) ───────────
  check:
    desc: Run ALL checks — lint, types, arch, tests, error contracts
    cmds:
      - task: check:lint
      - task: check:types
      - task: check:arch
      - task: check:test
      - task: check:errors

  check:lint:
    desc: Run the linter
    cmds:
      - task: lint

  check:types:
    desc: Run the type checker
    cmds:
      - cd {{.BACKEND_DIR}} && uv run pyright app/

  check:arch:
    desc: Run import-linter architecture checks
    dir: "{{.BACKEND_DIR}}"
    cmds:
      - uv run lint-imports --config architecture/import-linter-contracts.ini

  check:test:
    desc: Run unit and integration tests
    cmds:
      - task: test:unit
      - task: test:integration

  check:errors:
    desc: Regenerate error contracts from errors.yaml (idempotent when in sync)
    cmds:
      - task: errors:generate

  # ── Testing ──────────────────────────────────────────────────
  test:
    desc: Run all test levels
    cmds:
      - task: test:unit
      - task: test:integration
      - task: test:contract

  test:unit:
    desc: Run unit tests
    dir: "{{.BACKEND_DIR}}"
    cmds:
      - uv run pytest tests/unit/ -v

  test:integration:
    desc: Run integration tests (in-process ASGI; no external services)
    dir: "{{.BACKEND_DIR}}"
    cmds:
      - uv run pytest tests/integration/ -v -m "not slow"

  test:slow:
    desc: Run integration tests marked slow (real Docling, real Ollama). Opt-in.
    dir: "{{.BACKEND_DIR}}"
    cmds:
      - uv run pytest tests/integration/ -v -m slow

  test:contract:
    desc: Run contract tests against the OpenAPI spec
    dir: "{{.BACKEND_DIR}}"
    cmds:
      - uv run pytest tests/contract/ -v

  # ── Linting & Formatting ─────────────────────────────────────
  lint:
    desc: Run the linter
    dir: "{{.BACKEND_DIR}}"
    cmds:
      - uv run ruff check .

  format:
    desc: Run the formatter
    dir: "{{.BACKEND_DIR}}"
    cmds:
      - uv run ruff format .

  # ── Skills ───────────────────────────────────────────────────
  skills:validate:
    desc: "STUB (fails) — real validator lands with PDFX-E002-F004. Not a passing gate."
    dir: "{{.BACKEND_DIR}}"
    cmds:
      - sh -c 'echo "skills:validate is a stub. Real implementation lands with PDFX-E002-F004. Do not rely on this task as a validation gate." >&2; exit 1'

  # ── Code Generation ──────────────────────────────────────────
  errors:check:
    desc: Verify generated error contracts are in sync with errors.yaml (fails on drift)
    cmds:
      - task: errors:generate
      - git diff --exit-code -- apps/backend/app/exceptions/_generated packages/error-contracts/src/generated.ts packages/error-contracts/src/required-keys.json

  errors:generate:
    desc: Generate error classes from errors.yaml
    dir: packages/error-contracts
    cmds:
      - |
        uv run --with pyyaml python -c "from pathlib import Path; from scripts.generate import generate_python, generate_typescript, generate_required_keys; p = Path('errors.yaml'); generate_python(p, Path('../../apps/backend/app/exceptions/_generated')); generate_typescript(p, Path('src/generated.ts')); generate_required_keys(p, Path('src/required-keys.json')); print('Generated all error contract files')"

  # ── Docker ───────────────────────────────────────────────────
  docker:build:
    desc: Build the backend Docker image
    cmds:
      - docker build -f infra/docker/backend.Dockerfile -t pdfx-backend .

  docker:up:
    desc: Start docker-compose stack
    cmds:
      - docker compose -f {{.COMPOSE_FILE}} up -d

  docker:down:
    desc: Stop docker-compose stack
    cmds:
      - docker compose -f {{.COMPOSE_FILE}} down
