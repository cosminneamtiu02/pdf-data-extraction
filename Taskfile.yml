version: "3"

# Per-task deadlines (issue #357).
#
# go-task's schema has no per-task `timeout:` attribute as of v3.49
# (https://taskfile.dev/docs/reference/schema), so every long-running
# task wraps its real command through `infra/taskfile/with_timeout.py`
# with a wall-clock deadline. A hung pytest, uv sync, or docker build
# will SIGTERM (then SIGKILL) at the declared deadline and return
# exit 124 (matching GNU timeout(1) convention), instead of stalling
# `task check` indefinitely. Meta-tests in
# apps/backend/tests/unit/meta/test_taskfile_hygiene.py pin the
# invariant that every task in the TASKS_REQUIRING_TIMEOUT allowlist
# carries a timeout wrapper on every shell command.
#
# Codegen tasks (errors:generate) declare `sources:` + `generates:`
# so Task can checksum the inputs and skip a no-op re-run when
# nothing has changed. `errors:check` runs the read-only `scripts.check`
# driver (generates into a temp dir and diffs), NOT `errors:generate` —
# per issue #291 the check must never mutate the working tree.

vars:
  BACKEND_DIR: apps/backend
  COMPOSE_FILE: infra/compose/docker-compose.yml
  TIMEOUT_WRAPPER: "{{.ROOT_DIR}}/infra/taskfile/with_timeout.py"

tasks:
  # ── Development ──────────────────────────────────────────────
  dev:
    desc: Start the backend via docker-compose
    cmds:
      - docker compose -f {{.COMPOSE_FILE}} up --build

  dev:backend:
    desc: Start backend only with hot reload
    dir: "{{.BACKEND_DIR}}"
    cmds:
      - uv run uvicorn app.main:app --reload --host 0.0.0.0 --port 8000

  # ── Check (Claude runs this before declaring done) ───────────
  check:
    desc: Run ALL checks — lint, types, architecture, skills, tests, infra hygiene, error contracts
    # Every required gate is enumerated here as a direct `task: <name>` edge
    # (issue #215). Do NOT collapse a gate into another task's cmds list:
    # reaching architecture/lint/etc. only via a sibling hides it from this
    # list and lets a future refactor silently drop it from the canonical
    # gate. A meta-test in apps/backend/tests/unit/architecture/test_taskfile_check_hygiene.py
    # pins this invariant.
    cmds:
      - task: check:lint
      - task: check:types
      - task: check:arch
      - task: skills:validate
      - task: check:test
      - task: check:hygiene
      - task: check:errors

  check:lint:
    desc: Run the linter and verify formatting (read-only)
    cmds:
      - task: lint
      - task: format:check

  check:types:
    desc: Run the type checker
    cmds:
      - task: check:types:backend
      - task: check:types:error-contracts

  check:types:backend:
    desc: Type-check the backend (pyright strict)
    dir: "{{.BACKEND_DIR}}"
    cmds:
      - python3 {{.TIMEOUT_WRAPPER}} 300 -- uv run pyright app/ scripts/ tests/

  check:types:error-contracts:
    desc: Type-check the error-contracts package (pyright strict)
    dir: packages/error-contracts
    cmds:
      - python3 {{.TIMEOUT_WRAPPER}} 300 -- uv run pyright

  check:arch:
    desc: Run import-linter architecture checks
    dir: "{{.BACKEND_DIR}}"
    cmds:
      - python3 {{.TIMEOUT_WRAPPER}} 120 -- uv run lint-imports --config architecture/import-linter-contracts.ini

  check:test:
    desc: Run unit, integration, and contract tests
    cmds:
      - task: test:unit
      - task: test:integration
      - task: test:contract

  check:hygiene:
    desc: Run Docker / CI / Dependabot workflow hygiene tests (infra/tests/hygiene/)
    # Static assertions about files outside apps/backend/ (Dockerfile,
    # workflows). Relocated out of apps/backend/tests/unit/architecture/
    # per issue #400 so the backend unit-test tree no longer mixes in
    # targets outside its scope. Runs from the backend dir so it inherits
    # that venv's pytest + pyyaml rather than requiring a second uv
    # environment for three YAML-parsing tests.
    dir: "{{.BACKEND_DIR}}"
    cmds:
      - python3 {{.TIMEOUT_WRAPPER}} 120 -- uv run pytest ../../infra/tests/hygiene/ -v

  check:errors:
    desc: Fail on generated error contract drift vs errors.yaml and run error-contracts tests
    cmds:
      - task: errors:check
      - task: errors:test

  # ── Testing ──────────────────────────────────────────────────
  test:
    desc: Run all test levels
    cmds:
      - task: test:unit
      - task: test:integration
      - task: test:contract

  test:unit:
    desc: "Run unit tests with coverage gate (--cov-fail-under pins issue #358 wiring)"
    dir: "{{.BACKEND_DIR}}"
    cmds:
      # Coverage wiring (issue #358): `--cov=app` hooks pytest-cov into the
      # run so the `[tool.coverage.report] fail_under = 80` gate in
      # pyproject.toml actually fires. `--cov-fail-under=80` restates the
      # same threshold at the call site so a future refactor of pyproject
      # cannot silently drop the gate. `--cov-report=term-missing` surfaces
      # uncovered lines in the local loop; `--cov-report=xml` emits
      # `coverage.xml` for CI artifact upload (gitignored locally).
      - python3 {{.TIMEOUT_WRAPPER}} 300 -- uv run pytest tests/unit/ -v --cov=app --cov-report=term-missing --cov-report=xml --cov-fail-under=80

  test:integration:
    desc: Run integration tests (in-process ASGI; no external services)
    dir: "{{.BACKEND_DIR}}"
    cmds:
      - python3 {{.TIMEOUT_WRAPPER}} 600 -- uv run pytest tests/integration/ -v -m "not slow"

  test:slow:
    desc: Run integration tests marked slow (real Docling, real Ollama). Opt-in.
    dir: "{{.BACKEND_DIR}}"
    cmds:
      - python3 {{.TIMEOUT_WRAPPER}} 1800 -- uv run pytest tests/integration/ -v -m slow

  test:contract:
    desc: Run contract tests against the OpenAPI spec
    dir: "{{.BACKEND_DIR}}"
    cmds:
      - python3 {{.TIMEOUT_WRAPPER}} 300 -- uv run pytest tests/contract/ -v

  # ── Linting & Formatting ─────────────────────────────────────
  lint:
    desc: Run ruff (format checking lives in `format:check`; architecture in `check:arch`)
    dir: "{{.BACKEND_DIR}}"
    cmds:
      - python3 {{.TIMEOUT_WRAPPER}} 120 -- uv run ruff check .

  format:
    desc: Run the formatter
    dir: "{{.BACKEND_DIR}}"
    cmds:
      - uv run ruff format .

  format:check:
    desc: Verify formatting without rewriting files (CI parity with ruff format --check)
    dir: "{{.BACKEND_DIR}}"
    cmds:
      - python3 {{.TIMEOUT_WRAPPER}} 120 -- uv run ruff format --check .

  # ── Skills ───────────────────────────────────────────────────
  skills:validate:
    desc: Validate skill YAMLs without booting FastAPI (dev-loop target; SKILLS_DIR optional)
    dir: "{{.BACKEND_DIR}}"
    vars:
      SKILLS_DIR: '{{.SKILLS_DIR | default ""}}'
    cmds:
      # Quote SKILLS_DIR so paths containing spaces survive shell tokenization.
      - python3 {{.TIMEOUT_WRAPPER}} 120 -- uv run python -m scripts.validate_skills{{if .SKILLS_DIR}} "{{.SKILLS_DIR}}"{{end}}

  # ── Benchmarking ─────────────────────────────────────────────
  bench:serve:
    desc: Start the backend with bench fixtures as the skill directory (for task bench)
    dir: "{{.BACKEND_DIR}}"
    env:
      SKILLS_DIR: fixtures/bench/skills
    cmds:
      - uv run uvicorn app.main:app --host 0.0.0.0 --port 8000

  bench:
    desc: Run local latency benchmark (start service first with task bench:serve)
    dir: "{{.BACKEND_DIR}}"
    vars:
      BENCH_URL: '{{.BENCH_URL | default "http://localhost:8000"}}'
      BENCH_ITERATIONS: '{{.BENCH_ITERATIONS | default "10"}}'
      BENCH_FIXTURES_DIR: '{{.BENCH_FIXTURES_DIR | default "fixtures/bench"}}'
      BENCH_SKILL_NAME: '{{.BENCH_SKILL_NAME | default "invoice"}}'
      BENCH_SKILL_VERSION: '{{.BENCH_SKILL_VERSION | default "1"}}'
      BENCH_SERVICE_PID: '{{.BENCH_SERVICE_PID | default ""}}'
    env:
      BENCH_URL: "{{.BENCH_URL}}"
      BENCH_ITERATIONS: "{{.BENCH_ITERATIONS}}"
      BENCH_FIXTURES_DIR: "{{.BENCH_FIXTURES_DIR}}"
      BENCH_SKILL_NAME: "{{.BENCH_SKILL_NAME}}"
      BENCH_SKILL_VERSION: "{{.BENCH_SKILL_VERSION}}"
      BENCH_SERVICE_PID: "{{.BENCH_SERVICE_PID}}"
    cmds:
      - uv run python -m scripts.benchmark

  # ── Code Generation ──────────────────────────────────────────
  errors:check:
    desc: Verify generated error contracts are in sync with errors.yaml (read-only, fails on drift)
    dir: packages/error-contracts
    cmds:
      - python3 {{.TIMEOUT_WRAPPER}} 60 -- uv run --with pyyaml python -m scripts.check

  errors:generate:
    desc: Regenerate Python exception classes, TypeScript types, and required-keys.json from errors.yaml
    dir: packages/error-contracts
    # sources/generates let Task checksum the inputs and skip a no-op
    # re-run when nothing has changed (go-task's incremental-build
    # contract). Editing errors.yaml invalidates the checksum and
    # forces regeneration; untouched runs short-circuit with an
    # "up-to-date" message. Issue #357.
    #
    # `sources` lists only files actually read by `python -m scripts.generate`:
    # errors.yaml (input), generate.py (generator), and the duplicate-key
    # safe loader it depends on. scripts/generate_all.py is the CI entry
    # point; it delegates to generate.py so editing it does not change
    # local codegen output, and listing it here would cause spurious
    # cache invalidations (PR #499 review).
    sources:
      - errors.yaml
      - scripts/generate.py
      - scripts/_duplicate_key_safe_loader.py
    generates:
      - ../../apps/backend/app/exceptions/_generated/*.py
      - src/generated.ts
      - src/required-keys.json
    cmds:
      # Proper argparse-based CLI entry point on scripts.generate (issue #372);
      # replaces the legacy inline `python -c '...'` block that used to live
      # here. .github/workflows/ci.yml still calls `python -m scripts.generate_all`,
      # which is now a thin shim that delegates to scripts.generate.main
      # (PR #499 review: previously the two entry points duplicated default
      # paths + argparse, which opened a silent drift window). Delegation
      # makes the "local vs. CI output is byte-identical" claim mechanical
      # rather than by-convention; `task errors:check` (and CI's "Verify
      # generated files are up to date" diff) catches any remaining drift.
      - python3 {{.TIMEOUT_WRAPPER}} 120 -- uv run --with pyyaml python -m scripts.generate

  errors:test:
    desc: Run error-contracts package tests (codegen + validator); CI parity with .github/workflows/ci.yml error-contracts job
    dir: packages/error-contracts
    cmds:
      - python3 {{.TIMEOUT_WRAPPER}} 300 -- uv run --with pytest --with pyyaml pytest tests/ -v

  # ── Docker ───────────────────────────────────────────────────
  docker:build:
    desc: Build the backend Docker image
    cmds:
      - python3 {{.TIMEOUT_WRAPPER}} 600 -- docker build -f infra/docker/backend.Dockerfile -t pdfx-backend .

  docker:up:
    desc: Start docker-compose stack
    cmds:
      - docker compose -f {{.COMPOSE_FILE}} up -d

  docker:down:
    desc: Stop docker-compose stack
    cmds:
      - docker compose -f {{.COMPOSE_FILE}} down
