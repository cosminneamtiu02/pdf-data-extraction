version: "3"

vars:
  BACKEND_DIR: apps/backend
  COMPOSE_FILE: infra/compose/docker-compose.yml

tasks:
  # ── Development ──────────────────────────────────────────────
  dev:
    desc: Start the backend via docker-compose
    cmds:
      - docker compose -f {{.COMPOSE_FILE}} up --build

  dev:backend:
    desc: Start backend only with hot reload
    dir: "{{.BACKEND_DIR}}"
    cmds:
      - uv run uvicorn app.main:app --reload --host 0.0.0.0 --port 8000

  # ── Check (Claude runs this before declaring done) ───────────
  check:
    desc: Run ALL checks — lint, types, skills, tests, error contracts
    cmds:
      - task: check:lint
      - task: check:types
      - task: skills:validate
      - task: check:test
      - task: check:errors

  check:lint:
    desc: Run the linter and verify formatting (read-only)
    cmds:
      - task: lint
      - task: format:check

  check:types:
    desc: Run the type checker
    cmds:
      - cd {{.BACKEND_DIR}} && uv run pyright app/ scripts/

  check:arch:
    desc: Run import-linter architecture checks
    dir: "{{.BACKEND_DIR}}"
    cmds:
      - uv run lint-imports --config architecture/import-linter-contracts.ini

  check:test:
    desc: Run unit, integration, and contract tests
    cmds:
      - task: test:unit
      - task: test:integration
      - task: test:contract

  check:errors:
    desc: Fail on generated error contract drift vs errors.yaml
    cmds:
      - task: errors:check

  # ── Testing ──────────────────────────────────────────────────
  test:
    desc: Run all test levels
    cmds:
      - task: test:unit
      - task: test:integration
      - task: test:contract

  test:unit:
    desc: Run unit tests
    dir: "{{.BACKEND_DIR}}"
    cmds:
      - uv run pytest tests/unit/ -v

  test:integration:
    desc: Run integration tests (in-process ASGI; no external services)
    dir: "{{.BACKEND_DIR}}"
    cmds:
      - uv run pytest tests/integration/ -v -m "not slow"

  test:slow:
    desc: Run integration tests marked slow (real Docling, real Ollama). Opt-in.
    dir: "{{.BACKEND_DIR}}"
    cmds:
      - uv run pytest tests/integration/ -v -m slow

  test:contract:
    desc: Run contract tests against the OpenAPI spec
    dir: "{{.BACKEND_DIR}}"
    cmds:
      - uv run pytest tests/contract/ -v

  # ── Linting & Formatting ─────────────────────────────────────
  lint:
    desc: Run ruff + import-linter (format checking lives in `format:check`)
    dir: "{{.BACKEND_DIR}}"
    cmds:
      - uv run ruff check .
      - task: check:arch

  format:
    desc: Run the formatter
    dir: "{{.BACKEND_DIR}}"
    cmds:
      - uv run ruff format .

  format:check:
    desc: Verify formatting without rewriting files (CI parity with ruff format --check)
    dir: "{{.BACKEND_DIR}}"
    cmds:
      - uv run ruff format --check .

  # ── Skills ───────────────────────────────────────────────────
  skills:validate:
    desc: Validate skill YAMLs without booting FastAPI (dev-loop target; SKILLS_DIR optional)
    dir: "{{.BACKEND_DIR}}"
    vars:
      SKILLS_DIR: '{{.SKILLS_DIR | default ""}}'
    cmds:
      # Quote SKILLS_DIR so paths containing spaces survive shell tokenization.
      - uv run python -m scripts.validate_skills{{if .SKILLS_DIR}} "{{.SKILLS_DIR}}"{{end}}

  # ── Benchmarking ─────────────────────────────────────────────
  bench:serve:
    desc: Start the backend with bench fixtures as the skill directory (for task bench)
    dir: "{{.BACKEND_DIR}}"
    env:
      SKILLS_DIR: fixtures/bench/skills
    cmds:
      - uv run uvicorn app.main:app --host 0.0.0.0 --port 8000

  bench:
    desc: Run local latency benchmark (start service first with task bench:serve)
    dir: "{{.BACKEND_DIR}}"
    vars:
      BENCH_URL: '{{.BENCH_URL | default "http://localhost:8000"}}'
      BENCH_ITERATIONS: '{{.BENCH_ITERATIONS | default "10"}}'
      BENCH_FIXTURES_DIR: '{{.BENCH_FIXTURES_DIR | default "fixtures/bench"}}'
      BENCH_SKILL_NAME: '{{.BENCH_SKILL_NAME | default "invoice"}}'
      BENCH_SKILL_VERSION: '{{.BENCH_SKILL_VERSION | default "1"}}'
    env:
      BENCH_URL: "{{.BENCH_URL}}"
      BENCH_ITERATIONS: "{{.BENCH_ITERATIONS}}"
      BENCH_FIXTURES_DIR: "{{.BENCH_FIXTURES_DIR}}"
      BENCH_SKILL_NAME: "{{.BENCH_SKILL_NAME}}"
      BENCH_SKILL_VERSION: "{{.BENCH_SKILL_VERSION}}"
    cmds:
      - uv run python -m scripts.benchmark

  # ── Code Generation ──────────────────────────────────────────
  errors:check:
    desc: Verify generated error contracts are in sync with errors.yaml (fails on drift)
    cmds:
      - task: errors:generate
      - git diff --exit-code -- apps/backend/app/exceptions/_generated packages/error-contracts/src/generated.ts packages/error-contracts/src/required-keys.json

  errors:generate:
    desc: Generate error classes from errors.yaml
    dir: packages/error-contracts
    cmds:
      - |
        uv run --with pyyaml python -c "from pathlib import Path; from scripts.generate import generate_python, generate_typescript, generate_required_keys; p = Path('errors.yaml'); generate_python(p, Path('../../apps/backend/app/exceptions/_generated')); generate_typescript(p, Path('src/generated.ts')); generate_required_keys(p, Path('src/required-keys.json')); print('Generated all error contract files')"

  # ── Docker ───────────────────────────────────────────────────
  docker:build:
    desc: Build the backend Docker image
    cmds:
      - docker build -f infra/docker/backend.Dockerfile -t pdfx-backend .

  docker:up:
    desc: Start docker-compose stack
    cmds:
      - docker compose -f {{.COMPOSE_FILE}} up -d

  docker:down:
    desc: Stop docker-compose stack
    cmds:
      - docker compose -f {{.COMPOSE_FILE}} down
