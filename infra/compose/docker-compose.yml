services:
  backend:
    build:
      context: ../..
      dockerfile: infra/docker/backend.Dockerfile
    ports:
      - "8000:8000"
    volumes:
      - ../../apps/backend/app:/app/app  # Only mount source, not .venv
    environment:
      - DATABASE_URL=postgresql+asyncpg://postgres:postgres@db:5432/app_dev
      - APP_ENV=development
      - LOG_LEVEL=info
      - CORS_ORIGINS=["http://localhost:5173"]
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    depends_on:
      db:
        condition: service_healthy

  frontend:
    image: node:22-alpine
    working_dir: /app
    ports:
      - "5173:5173"
    volumes:
      - ../../apps/frontend:/app
      - frontend_node_modules:/app/node_modules
    command: npx pnpm dev --host 0.0.0.0
    depends_on:
      - backend

  db:
    image: postgres:17
    ports:
      - "127.0.0.1:5432:5432"  # Localhost only — not exposed to network
    environment:
      POSTGRES_DB: app_dev
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
  frontend_node_modules:
