services:
  # The extraction service runs as a single container.
  # Ollama runs on the host machine (outside this compose file) and is
  # reached via `host.docker.internal:11434` by default. If you prefer a
  # non-containerized dev loop, run `task dev:backend` directly on the
  # host and point `OLLAMA_BASE_URL` at `http://localhost:11434`.
  backend:
    build:
      context: ../..
      dockerfile: infra/docker/backend.Dockerfile
    ports:
      - "8000:8000"
    volumes:
      - ../../apps/backend/app:/app/app  # Only mount source, not .venv
      # Live-mount skill YAMLs so editing a skill does not require an image
      # rebuild. Read-only because the container never writes to skills/.
      # Container path matches `Settings.skills_dir`'s default (`/app/skills`
      # under the Dockerfile's `WORKDIR /app`).
      - ../../apps/backend/skills:/app/skills:ro
    environment:
      - APP_ENV=development
      - LOG_LEVEL=info
      - CORS_ORIGINS=["http://localhost:5173"]
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    extra_hosts:
      # Makes `host.docker.internal` resolve on Linux to the host. On
      # Docker Desktop for Mac and Windows this is automatic.
      - "host.docker.internal:host-gateway"
