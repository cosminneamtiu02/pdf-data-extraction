services:
  # The extraction service runs as a single container.
  # Ollama runs on the host machine (outside this compose file) and is
  # reached via `host.docker.internal:11434` by default.
  backend:
    build:
      context: ../..
      dockerfile: infra/docker/backend.Dockerfile
    ports:
      - "8000:8000"
    environment:
      # These override Settings defaults for production.
      # See apps/backend/app/core/config.py for all available settings.
      - APP_ENV=production
      - LOG_LEVEL=info
      - CORS_ORIGINS=${CORS_ORIGINS:-[]}
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --workers 1
    restart: always
    extra_hosts:
      - "host.docker.internal:host-gateway"
