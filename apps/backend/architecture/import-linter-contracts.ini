[importlinter]
root_package = app
include_external_packages = True

# ═════════════════════════════════════════════════════════════════════════
# shared-no-features (template contract, preserved verbatim).
# Shared, core, and schemas layers cannot reach into features because they
# are feature-agnostic infrastructure. Features own the domain; shared
# infrastructure must stay domain-neutral. Pre-dates PDFX-E007-F004.
# ═════════════════════════════════════════════════════════════════════════

[importlinter:contract:shared-no-features]
name = Shared and core must not import from features
type = forbidden
source_modules =
    app.shared
    app.core
    app.schemas
forbidden_modules =
    app.features

# ═════════════════════════════════════════════════════════════════════════
# C1 - Feature independence placeholder (PDFX-E007-F004).
# The extraction feature is intended to remain a self-contained vertical
# slice and must not reach into sibling feature packages.
#
# Important: with only one listed module (`app.features.extraction`), an
# `independence` contract is trivially satisfied and does NOT mechanically
# block extraction from importing a future sibling feature. This section
# is therefore documentation/a placeholder only for the current single-
# feature state.
#
# When a second feature package is introduced, this contract MUST be
# amended to include the additional feature module(s), or replaced with a
# stronger enforcement approach, so cross-feature imports are actually
# checked by import-linter.
#
# The real mechanical enforcement today lives in the AST-scan test at
# `tests/unit/architecture/test_dynamic_import_containment.py` which
# walks every .py file under app/features/extraction/ and rejects any
# import (static or dynamic) of app.features.<non-extraction>.
# ═════════════════════════════════════════════════════════════════════════

[importlinter:contract:c1-feature-independence]
name = C1: feature independence placeholder; amend when another feature is added
type = independence
modules =
    app.features.extraction

# ═════════════════════════════════════════════════════════════════════════
# C2 - Intra-feature layer DAG (PDFX-E007-F004, design spec S10).
#
# The extraction feature's subpackages form a dependency graph that is not
# a clean linear stack. Coordinates and extraction are allowed to reach
# into specific lower siblings, while annotation and the leaves (parsing,
# intelligence, skills) are strictly below. The DAG is:
#
#     router (future) -> service (future) -> {coordinates, annotation,
#         extraction} -> {parsing, intelligence, skills} -> schemas
#
# With these cross-edges inside the mid tier:
#   - coordinates may import extraction, parsing, schemas; may NOT import
#     annotation, intelligence, skills. (C2d enforces the "may NOT" side.)
#   - extraction may import parsing, intelligence, skills, schemas; may NOT
#     import coordinates, annotation. (C2c enforces the "may NOT" side.)
#   - annotation may import schemas only.
#   - parsing, intelligence, skills may import schemas only and must be
#     independent of each other.
#   - schemas is the base - imports nothing else in the feature.
#
# router/ and service/ do not yet exist (they land with PDFX-E002-F004 and
# PDFX-E007-F001). We leave them out of the contracts until those files
# exist, to avoid referencing non-existent modules.
#
# The DAG cannot be expressed cleanly in a single `layers` contract because
# mid-tier subpackages have asymmetric cross-edges (e.g. coordinates ->
# extraction but not extraction -> coordinates). We therefore use multiple
# narrowly-scoped `forbidden` / `independence` contracts, one per role.
# ═════════════════════════════════════════════════════════════════════════

# ─────────────────────────────────────────────────────────────────────────
# C2a - The four leaf subpackages (parsing, intelligence, skills,
# annotation) may not import each other. Independence captures the
# "siblings cannot reach across" invariant in one contract.
#
# ignore_imports carve-out: DoclingConfigMerger is a cross-layer bridge
# that semantically belongs in the future service layer (PDFX-E002-F004),
# but physically lives in parsing/ today. It imports SkillDoclingConfig
# to typecheck the per-skill override block before merging with
# Settings-derived defaults. This is a time-bounded exception: when the
# service layer lands and claims the merger, remove this line.
# ─────────────────────────────────────────────────────────────────────────

[importlinter:contract:c2a-extraction-layers-leaves-independent]
name = C2a: parsing, intelligence, skills, annotation are independent leaves
type = independence
modules =
    app.features.extraction.parsing
    app.features.extraction.intelligence
    app.features.extraction.skills
    app.features.extraction.annotation
ignore_imports =
    app.features.extraction.parsing.docling_config_merger -> app.features.extraction.skills.skill_docling_config

# ─────────────────────────────────────────────────────────────────────────
# C2b - The four leaf subpackages may not import from the mid-tier
# subpackages (coordinates, extraction). This complements C2a's sibling
# independence with the "no upward imports" rule. Schemas is not in the
# forbidden list because leaves are allowed to import schemas.
# ─────────────────────────────────────────────────────────────────────────

[importlinter:contract:c2b-extraction-layers-leaves-no-upward]
name = C2b: leaf subpackages may not import from mid-tier siblings
type = forbidden
source_modules =
    app.features.extraction.parsing
    app.features.extraction.intelligence
    app.features.extraction.skills
    app.features.extraction.annotation
forbidden_modules =
    app.features.extraction.coordinates
    app.features.extraction.extraction

# ─────────────────────────────────────────────────────────────────────────
# C2c - The extraction subpackage orchestrates LangExtract calls and may
# import parsing, intelligence, and skills. It must not import coordinates
# or annotation (those are further downstream in the pipeline DAG).
# ─────────────────────────────────────────────────────────────────────────

[importlinter:contract:c2c-extraction-layers-extraction-subpackage]
name = C2c: extraction subpackage may not import coordinates or annotation
type = forbidden
source_modules =
    app.features.extraction.extraction
forbidden_modules =
    app.features.extraction.coordinates
    app.features.extraction.annotation

# ─────────────────────────────────────────────────────────────────────────
# C2d - The coordinates subpackage resolves extracted spans onto parsed
# document bounding boxes. It may import parsing and extraction but must
# not reach into annotation, intelligence, or skills (the resolver should
# not know about LLMs or PDF annotation - it only consumes raw data from
# the parser and the extraction engine).
# ─────────────────────────────────────────────────────────────────────────

[importlinter:contract:c2d-extraction-layers-coordinates-subpackage]
name = C2d: coordinates may not import annotation, intelligence, or skills
type = forbidden
source_modules =
    app.features.extraction.coordinates
forbidden_modules =
    app.features.extraction.annotation
    app.features.extraction.intelligence
    app.features.extraction.skills

# ─────────────────────────────────────────────────────────────────────────
# C2e - The schemas subpackage is the base layer of the feature: it must
# not import from any sibling subpackage. Schemas holds pure value types
# (BoundingBoxRef, ExtractedField, FieldStatus, OutputMode, ...) that the
# rest of the feature builds on. If schemas ever imports from parsing or
# elsewhere, the rest of the DAG collapses.
# ─────────────────────────────────────────────────────────────────────────

[importlinter:contract:c2e-extraction-layers-schemas-base]
name = C2e: schemas is the base layer - cannot import any feature sibling
type = forbidden
source_modules =
    app.features.extraction.schemas
forbidden_modules =
    app.features.extraction.coordinates
    app.features.extraction.annotation
    app.features.extraction.extraction
    app.features.extraction.parsing
    app.features.extraction.intelligence
    app.features.extraction.skills

# ═════════════════════════════════════════════════════════════════════════
# C3 - Docling containment (PDFX-E007-F004, issue #159 refactor).
# Docling pulls a heavy ML runtime (torch, torchvision, transformers).
# Containment to a small, named set of files keeps the rest of the codebase
# cheap to import and ensures a future parser swap touches a handful of
# files in one package, not dozens across the service.
#
# The containment boundary is the `parsing/` package, with three files
# that are permitted to reach Docling types:
#   1. `parsing/_real_docling_converter_adapter.py` — the lazy-importer
#      that builds the real `DocumentConverter` and the adapter class
#      that wraps it.
#   2. `parsing/_real_docling_document_adapter.py` — the wrapper around
#      `DoclingDocument` that presents `DoclingDocumentLike`.
#   3. `parsing/docling_document_parser.py` — the public coordinator
#      class and the `_default_pdf_preflight` function (the latter
#      touches pymupdf, NOT docling — see C4).
#
# Today the adapters use lazy `importlib.import_module` instead of a
# static `import docling`, so import-linter sees no edge yet. The
# ignore_imports carve-outs are proactive: when someone switches to a
# static import, the contract stays green. Dynamic import containment is
# enforced by the AST-scan test in `test_dynamic_import_containment.py`,
# not by import-linter.
#
# source_modules = app (not just app.features.extraction) so that
# app.api, app.core, and every other module outside the feature are
# also forbidden from importing docling.
# ═════════════════════════════════════════════════════════════════════════

[importlinter:contract:c3-docling-containment]
name = C3: docling may only be imported in parsing/_real_docling_*_adapter or docling_document_parser
type = forbidden
source_modules =
    app
forbidden_modules =
    docling
ignore_imports =
    app.features.extraction.parsing.docling_document_parser -> docling
    app.features.extraction.parsing._real_docling_converter_adapter -> docling
    app.features.extraction.parsing._real_docling_document_adapter -> docling
unmatched_ignore_imports_alerting = warn

# ═════════════════════════════════════════════════════════════════════════
# C4 - PyMuPDF (fitz) containment (PDFX-E007-F004).
# PyMuPDF exposes two import roots: the modern `pymupdf` name and the
# legacy `fitz` alias. Both are forbidden outside the designated files.
# Allowed files:
#   1. annotation/pdf_annotator.py - the primary annotation renderer
#      (currently uses `import pymupdf` statically).
#   2. parsing/docling_document_parser.py - uses pymupdf dynamically via
#      importlib.import_module for password-detection preflight. The
#      carve-out is proactive so a future switch to static import works.
# Both `pymupdf` and `fitz` import names are carved out for each
# allowed file to prevent either alias from breaking the contract.
#
# source_modules = app so that app.api, app.core, etc. are also covered.
# ═════════════════════════════════════════════════════════════════════════

[importlinter:contract:c4-pymupdf-containment]
name = C4: pymupdf/fitz may only be imported in pdf_annotator and docling_document_parser
type = forbidden
source_modules =
    app
forbidden_modules =
    pymupdf
    fitz
ignore_imports =
    app.features.extraction.annotation.pdf_annotator -> pymupdf
    app.features.extraction.annotation.pdf_annotator -> fitz
    app.features.extraction.parsing.docling_document_parser -> pymupdf
    app.features.extraction.parsing.docling_document_parser -> fitz
unmatched_ignore_imports_alerting = warn

# ═════════════════════════════════════════════════════════════════════════
# C5 - LangExtract containment (PDFX-E007-F004).
# LangExtract drives the extraction orchestration (prompt building,
# example selection, retry loop). It is imported in exactly three
# files — two inside `app.features.extraction.extraction` (the
# orchestration subpackage) and one inside
# `app.features.extraction.intelligence` (the provider plugin):
#   1. `extraction/extraction_engine.py` - the primary LangExtract caller
#      that runs the extraction loop and returns `RawExtraction` objects.
#   2. `extraction/_validating_langextract_adapter.py` - the
#      `BaseLanguageModel` subclass that routes LangExtract `infer` calls
#      through `IntelligenceProvider.generate`. Split out of
#      `extraction_engine.py` to satisfy Sacred Rule #1 (one class per
#      file, issue #228). Still in the same orchestration subpackage as
#      the engine, so the intra-`extraction/` boundary is unchanged.
#   3. `intelligence/ollama_gemma_provider.py` - the community provider
#      plugin that registers the Ollama/Gemma adapter with LangExtract's
#      dispatcher. Lives in the intelligence subpackage because it
#      implements the Ollama HTTP side of the provider. Declared in
#      pyproject.toml under
#      `[project.entry-points."langextract.providers"]` so LangExtract
#      discovers it at import time.
# The contract is file-level: `ignore_imports` enumerates each allowed
# module explicitly rather than authorising either subpackage wholesale.
# source_modules = app so that app.api, app.core, etc. are also covered.
# ═════════════════════════════════════════════════════════════════════════

[importlinter:contract:c5-langextract-containment]
name = C5: langextract may only be imported in extraction_engine, _validating_langextract_adapter, and ollama_gemma_provider
type = forbidden
source_modules =
    app
forbidden_modules =
    langextract
ignore_imports =
    app.features.extraction.extraction.extraction_engine -> langextract
    app.features.extraction.extraction._validating_langextract_adapter -> langextract
    app.features.extraction.intelligence.ollama_gemma_provider -> langextract

# ═════════════════════════════════════════════════════════════════════════
# C6 - httpx containment (PDFX-E007-F004).
# The Ollama HTTP client is an `httpx.AsyncClient` used to talk to the
# local Ollama server. Two files are pre-authorized to import httpx:
#   1. `ollama_gemma_provider.py` (today): the LangExtract provider plugin.
#   2. `ollama_health_probe.py` (future, PDFX-E007-F001): the readiness
#      probe. Pre-listed so it can land without editing this contract.
# source_modules = app so that app.api, app.core, etc. are also covered.
#
# The `httpx` test client under `apps/backend/tests/` is outside
# `root_package = app` and therefore invisible to this contract.
# ═════════════════════════════════════════════════════════════════════════

[importlinter:contract:c6-httpx-containment]
name = C6: httpx may only be imported in ollama_gemma_provider and ollama_health_probe
type = forbidden
source_modules =
    app
forbidden_modules =
    httpx
ignore_imports =
    app.features.extraction.intelligence.ollama_gemma_provider -> httpx
    app.features.extraction.intelligence.ollama_health_probe -> httpx
unmatched_ignore_imports_alerting = warn
