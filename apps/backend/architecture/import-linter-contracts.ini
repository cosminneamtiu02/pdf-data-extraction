[importlinter]
root_package = app

[importlinter:contract:feature-isolation]
name = Features must not import from other features
type = independence
modules =
    app.features.widget

[importlinter:contract:schemas-no-models]
name = Schemas must not import SQLAlchemy models
type = forbidden
source_modules =
    app.features.widget.schemas
    app.schemas
forbidden_modules =
    app.features.widget.model
    app.shared.base_model

[importlinter:contract:shared-no-features]
name = Shared and core must not import from features
type = forbidden
source_modules =
    app.shared
    app.core
    app.schemas
    app.types
forbidden_modules =
    app.features

[importlinter:contract:feature-layering]
name = Feature internal layering: router → service → repository
type = layers
layers =
    router
    service
    repository
containers =
    app.features.widget

# Note: We don't use a generated-exceptions-isolation contract because
# import-linter traces transitive imports. app.shared imports app.exceptions
# (public API), and app.exceptions.__init__ imports from _generated.
# This is correct behavior — the discipline is enforced by CLAUDE.md:
# "Never import from exceptions._generated directly."
