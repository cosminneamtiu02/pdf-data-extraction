[importlinter]
root_package = app

# Shared, core, schemas must not import from features.
# This contract is always-on; it keeps the feature-agnostic layers clean.
[importlinter:contract:shared-no-features]
name = Shared and core must not import from features
type = forbidden
source_modules =
    app.shared
    app.core
    app.schemas
forbidden_modules =
    app.features

# Note:
# - The feature-independence and intra-feature layering contracts land as part of
#   PDFX-E007-F004 during feature-dev, once the extraction feature's subpackages
#   (parsing, intelligence, extraction, skills, coordinates, annotation) exist.
# - Third-party dependency containment rules (Docling, PyMuPDF, LangExtract,
#   Ollama client) also land in PDFX-E007-F004.
# - We don't use a generated-exceptions-isolation contract because import-linter
#   traces transitive imports. app.shared imports app.exceptions (public API),
#   and app.exceptions.__init__ imports from _generated. This is correct behavior
#   — the discipline is enforced by CLAUDE.md: "Never import from
#   exceptions._generated directly."
