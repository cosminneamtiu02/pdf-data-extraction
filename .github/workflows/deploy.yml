# Deploy workflow — triggers on push to main.
# Gate: branch protection requires CI to pass before merge.
# This workflow does NOT depend on the CI workflow directly — the gate is
# at the branch level, not the workflow level.
name: Deploy

on:
  push:
    branches: [main]

# Serialize deploys on the same ref without cancelling an in-flight deploy.
# cancel-in-progress is deliberately false: once a deploy is running, it
# must finish (partial deploys are worse than slightly-delayed deploys).
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Build backend Docker image
        run: docker build -f infra/docker/backend.Dockerfile -t pdf-data-extraction-backend:${{ github.sha }} .

      # Registry push is wired behind the DEPLOY_ENABLED repo variable so
      # the Deploy job stays green (Build step still verifies the Dockerfile
      # on every merge, push step is SKIPPED) until #121 lands the actual
      # registry credentials + push command. An unconditional `exit 1` here
      # would habituate on-call to a permanently-red Deploy job and mask a
      # real failure once the push is wired (issue #270).
      - name: Push to registry
        if: vars.DEPLOY_ENABLED == 'true'
        run: |
          echo "::error::Push to registry not yet implemented — see issue #121 for tracking."
          exit 1

      # Companion to the gated push step above: when DEPLOY_ENABLED is unset
      # or anything other than the literal string "true", the push is
      # silently skipped and the job lands green. That can create "green
      # deploy" false confidence — an operator reading the run UI might
      # assume an image was pushed. Emit a loud `::warning::` annotation so
      # the run page makes the no-op explicit and points at the flip.
      - name: Deploy disabled notice
        if: vars.DEPLOY_ENABLED != 'true'
        run: |
          echo "::warning::Deploy is intentionally disabled for this repository. No image was pushed or deployed. To enable deployment, set the repository variable DEPLOY_ENABLED to 'true' once the registry push from issue #121 lands."
