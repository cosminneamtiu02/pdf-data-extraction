name: CI

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend-checks:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    defaults:
      run:
        working-directory: apps/backend
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          # No downstream step pushes or calls an authenticated GH API;
          # keeping GITHUB_TOKEN in git config is unnecessary attack
          # surface if a run: step is ever compromised. Issue #212.
          persist-credentials: false

      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b  # v8.1.0
        with:
          enable-cache: true
          cache-dependency-glob: apps/backend/uv.lock

      - name: Set up Python
        run: uv python install 3.13

      - name: Install dependencies
        run: uv sync --dev

      - name: Lint (ruff)
        run: uv run ruff check app/ scripts/ tests/

      - name: Format check (ruff)
        run: uv run ruff format --check app/ scripts/ tests/

      - name: Type check (pyright)
        run: uv run pyright app/ scripts/

      - name: Architecture check (import-linter)
        run: uv run lint-imports --config architecture/import-linter-contracts.ini

      - name: Unit tests
        # Must match `task test:unit` locally: no marker filter so any test
        # under tests/unit/ runs (including slow-marked unit tests, if any).
        # Splitting unit from integration here keeps unit-test selection
        # unchanged while allowing CI to apply `-m "not slow"` only to the
        # integration suite. The previous combined step ran
        # `pytest tests/unit/ tests/integration/ -v` with no marker filter.
        run: uv run pytest tests/unit/ -v

      - name: Integration tests
        # Must match `task test:integration` locally: excludes
        # @pytest.mark.slow in CI, leaving slower/e2e/external-dependency
        # integration coverage (e.g. real-Docling parsing, real-Ollama
        # round-trips) opt-in rather than required for the default gate.
        # Slow-marked tests can be run separately via `task test:slow`.
        run: uv run pytest tests/integration/ -v -m "not slow"

      - name: Contract tests
        run: uv run pytest tests/contract/ -v

  dockerfile-build:
    # Issue #417: `deploy.yml`'s job-level `if: vars.DEPLOY_ENABLED ==
    # 'true'` guard (#300) skips the Build step on every merge, so the
    # Dockerfile is not exercised in CI by default. Static checks in
    # `test_dockerfile_hygiene.py` only parse the Dockerfile — they
    # cannot catch wrong COPY paths, disappearing apt packages, or any
    # runtime-of-build failure. This job closes that gap by running
    # `docker build` on every PR without pushing to any registry.
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          # No downstream step pushes or calls an authenticated GH API.
          persist-credentials: false

      - name: Build backend Docker image
        # No `--push`, no registry credentials, no DEPLOY_ENABLED
        # coupling. Pure build verification. The image is named for
        # local use on the runner only; it is discarded when the runner
        # tears down.
        run: docker build -f infra/docker/backend.Dockerfile -t pdfx-backend:ci-${{ github.sha }} .

  error-contracts:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    # Job-level concurrency group (issue #410). The workflow-level group
    # (`${{ github.workflow }}-${{ github.ref }}`) cancels BOTH jobs when a
    # second push arrives on the same ref. That leaves PRs in a "workflow
    # cancelled" state where required status checks show as missing, and
    # `gh pr merge --auto` waits forever. Scoping error-contracts to its
    # own group means its short ~1 min window is isolated from the long
    # backend-checks job: a second push only cancels the stale
    # error-contracts run, not the full workflow.
    concurrency:
      group: ci-error-contracts-${{ github.ref }}
      cancel-in-progress: true
    defaults:
      run:
        working-directory: packages/error-contracts
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          # No downstream step pushes or calls an authenticated GH API;
          # keeping GITHUB_TOKEN in git config is unnecessary attack
          # surface if a run: step is ever compromised. Issue #212.
          persist-credentials: false

      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b  # v8.1.0

      - name: Set up Python
        run: uv python install 3.13

      - name: Install dependencies
        run: uv sync --dev

      - name: Codegen + validator tests
        run: uv run --with pytest --with pyyaml pytest tests/ -v

      - name: Regenerate error contracts
        run: |
          uv run --with pyyaml python -c "
          from pathlib import Path
          from scripts.generate import generate_python, generate_typescript, generate_required_keys
          p = Path('errors.yaml')
          generate_python(p, Path('../../apps/backend/app/exceptions/_generated'))
          generate_typescript(p, Path('src/generated.ts'))
          generate_required_keys(p, Path('src/required-keys.json'))
          "

      - name: Verify generated files are up to date
        working-directory: .
        run: |
          git diff --exit-code apps/backend/app/exceptions/_generated/
          git diff --exit-code packages/error-contracts/src/generated.ts
          git diff --exit-code packages/error-contracts/src/required-keys.json
