name: CI

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  backend-checks:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/backend
    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          cache-dependency-glob: apps/backend/uv.lock

      - name: Set up Python
        run: uv python install 3.13

      - name: Install dependencies
        run: uv sync --dev

      - name: Lint (ruff)
        run: uv run ruff check app/ tests/

      - name: Format check (ruff)
        run: uv run ruff format --check app/ tests/

      - name: Type check (pyright)
        run: uv run pyright app/

      - name: Architecture check (import-linter)
        run: uv run lint-imports --config architecture/import-linter-contracts.ini

      - name: Unit + Integration tests
        # Must match `task test:integration` / `task check` locally: both
        # exclude @pytest.mark.slow so the gate is reproducible without a
        # real Ollama on the runner. Keeping them in sync prevents a silent
        # regression the moment a `@pytest.mark.slow` test is added.
        run: uv run pytest tests/unit/ tests/integration/ -v -m "not slow"

      - name: Contract tests
        run: uv run pytest tests/contract/ -v

  error-contracts:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/error-contracts
    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Set up Python
        run: uv python install 3.13

      - name: Install dependencies
        run: uv sync --dev

      - name: Codegen + validator tests
        run: uv run --with pytest --with pyyaml pytest tests/ -v

      - name: Regenerate error contracts
        run: |
          uv run --with pyyaml python -c "
          from pathlib import Path
          from scripts.generate import generate_python, generate_typescript, generate_required_keys
          p = Path('errors.yaml')
          generate_python(p, Path('../../apps/backend/app/exceptions/_generated'))
          generate_typescript(p, Path('src/generated.ts'))
          generate_required_keys(p, Path('src/required-keys.json'))
          "

      - name: Verify generated files are up to date
        working-directory: .
        run: |
          git diff --exit-code apps/backend/app/exceptions/_generated/
          git diff --exit-code packages/error-contracts/src/generated.ts
          git diff --exit-code packages/error-contracts/src/required-keys.json
