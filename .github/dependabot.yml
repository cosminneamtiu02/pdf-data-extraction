# Dependabot configuration.
#
# Groups are used aggressively here. Each `groups` entry batches
# interlocking packages into a single weekly PR instead of one-per-
# package. This matters for two reasons:
#
#   1. Interlocking ecosystems have cross-package peer dependencies
#      that only resolve cleanly when all members move together.
#      Bumping one at a time produces lockfile resolutions that
#      silently drift the others.
#
#   2. Multiple single-package PRs that all touch the same lines of a
#      manifest file are mutually-exclusive merge candidates -- only
#      one can rebase cleanly before the others go red.
#
# See docs/automerge.md and docs/decisions.md ADR-010 for the wider
# auto-merge architecture. See docs/new-project-setup.md for the
# `DEPENDABOT_AUTOMERGE_ENABLED` variable this pairs with.

version: 2
updates:
  - package-ecosystem: "pip"
    directory: "/apps/backend"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    groups:
      # Pydantic v2 core + settings package are released in lockstep
      # and the settings package's version range is pinned against
      # pydantic's minor version.
      pydantic:
        patterns:
          - "pydantic"
          - "pydantic-settings"
      # pytest's ecosystem ships plugin releases aligned with pytest
      # minor bumps. Grouping prevents stale-plugin failures on the
      # first CI run after a pytest bump.
      pytest:
        patterns:
          - "pytest"
          - "pytest-*"
      # FastAPI + Starlette + uvicorn share ASGI contract versions.
      # Uvicorn's standard extras pin httptools/websockets against
      # the uvicorn minor version.
      fastapi-stack:
        patterns:
          - "fastapi"
          - "starlette"
          - "uvicorn*"
      # Docling + torch + torchvision are an interlocking ML cluster.
      # Docling pulls torch/torchvision as transitives; they're declared
      # direct in apps/backend/pyproject.toml so `[tool.uv.sources]`
      # CPU-index routing takes effect (ADR-012, issue #139). The three
      # sit on adjacent lines of that manifest and move in lockstep, so a
      # weekly sequence that bumps `docling` first and `torch` second is
      # the exact rebase-conflict cascade pattern documented in
      # docs/automerge.md Incident 3. Grouping them ships the cluster as
      # one atomic PR and prevents the cascade. `transformers` rides
      # along — it is a docling transitive that moves on the same cadence
      # and shares version ranges with docling's pinned upper bounds.
      docling-stack:
        patterns:
          - "docling"
          - "docling-*"
          - "torch"
          - "torchvision"
          - "transformers"

  - package-ecosystem: "pip"
    directory: "/packages/error-contracts"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    groups:
      pytest:
        patterns:
          - "pytest"
          - "pytest-*"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    groups:
      # Bump all official GitHub actions together (actions/checkout,
      # actions/setup-python, etc.). These are version-independent but
      # bundling the weekly bumps into one PR reduces noise.
      github-official-actions:
        patterns:
          - "actions/*"

  # Backend Dockerfile base image is pinned by SHA digest (issue #156);
  # Dependabot proposes digest bumps weekly so the pin stays current
  # against upstream python:3.13-slim rebuilds instead of silently
  # rotting into a stale SHA.
  - package-ecosystem: "docker"
    directory: "/infra/docker"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
