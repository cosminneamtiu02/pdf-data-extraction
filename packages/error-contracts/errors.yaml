version: 1

errors:
  # Generic errors (apply across domains)
  NOT_FOUND:
    http_status: 404
    description: Requested resource does not exist
    params: {}

  CONFLICT:
    http_status: 409
    description: Operation conflicts with current state
    params: {}

  VALIDATION_FAILED:
    http_status: 422
    description: Request payload failed validation
    params:
      field: string
      reason: string

  INTERNAL_ERROR:
    http_status: 500
    description: Unhandled server error; details are logged with request_id
    params: {}

  SKILL_VALIDATION_FAILED:
    http_status: 500
    description: Skill YAML file failed validation at parse time
    params:
      reason: string
