version: 1

errors:
  # Generic errors (apply across domains)
  NOT_FOUND:
    http_status: 404
    description: Requested resource does not exist
    params: {}

  VALIDATION_FAILED:
    http_status: 422
    description: Request payload failed validation
    params:
      field: string
      reason: string

  INTERNAL_ERROR:
    http_status: 500
    description: Unhandled server error; details are logged with request_id
    params: {}

  SKILL_VALIDATION_FAILED:
    http_status: 500
    description: Skill YAML file failed validation at parse time (startup-only; never reaches HTTP response path)
    params:
      file: string
      reason: string

  SKILL_NOT_FOUND:
    http_status: 404
    description: Requested skill (name, version) is not registered in the manifest
    params:
      name: string
      version: string

  # PDF failure-mode errors (PDFX-E003-F004)
  PDF_INVALID:
    http_status: 400
    description: The uploaded file is not a valid PDF
    params: {}

  PDF_PASSWORD_PROTECTED:
    http_status: 400
    description: The uploaded PDF is password-protected
    params: {}

  PDF_TOO_MANY_PAGES:
    http_status: 413
    description: PDF page count exceeds the configured maximum
    params:
      limit: integer
      actual: integer

  PDF_NO_TEXT_EXTRACTABLE:
    http_status: 422
    description: The PDF contains no extractable text, even after OCR
    params: {}

  INTELLIGENCE_UNAVAILABLE:
    http_status: 503
    description: The intelligence backend (Ollama) is currently unavailable.
    params: {}

  STRUCTURED_OUTPUT_FAILED:
    http_status: 502
    description: The model failed to produce valid structured output after the maximum number of attempts.
    params: {}

  # Extraction pipeline / router errors (PDFX-E006-F002, PDFX-E006-F003)
  INTELLIGENCE_TIMEOUT:
    http_status: 504
    description: The extraction pipeline did not complete within the configured timeout budget
    params:
      budget_seconds: number

  PDF_TOO_LARGE:
    http_status: 413
    description: The uploaded PDF exceeds the configured byte-size limit
    params:
      max_bytes: integer
      actual_bytes: integer

  PDF_PARSER_UNAVAILABLE:
    http_status: 500
    description: The PDF parser cannot run because a required runtime dependency (e.g. docling, pymupdf) is not installed in this deployment
    params:
      dependency: string
