[project]
name = "error-contracts"
version = "0.1.0"
description = "Error code definitions, codegen, and translation validation"
requires-python = ">=3.13"
dependencies = [
    "pyyaml>=6.0.3",
]

[dependency-groups]
dev = [
    "pyright>=1.1.408",
    "pytest>=9.0.3",
]

[tool.pytest.ini_options]
pythonpath = ["."]

[tool.pyright]
pythonVersion = "3.13"
typeCheckingMode = "strict"
include = ["scripts", "tests"]
# Mirror [tool.pytest.ini_options] pythonpath so pyright resolves `scripts.*`
# imports from tests. Pytest adds the package root to sys.path at runtime; this
# gives pyright the same view statically. See issue #163.
extraPaths = ["."]
# Pin the venv explicitly so pyright resolves imports from site-packages
# without relying on its brittle auto-detection. The repo's pre-push pyright
# hook (local hook in .pre-commit-config.yaml) invokes `uv run pyright` from
# this directory; without this pin, pyright's own heuristic for locating a
# venv relative to the config file has proven unreliable in pre-commit
# contexts and fails on newly-added test files that import pytest/yaml with
# reportMissingImports.
# Both `venvPath` and `venv` are required per pyright docs: venvPath is the
# directory containing the venv, venv is the subdirectory name within it.
venvPath = "."
venv = ".venv"

# Tests may pass arguments that exercise validation (intentionally malformed
# structures). Relax the strict noise on the tests tree so the codegen script
# itself carries the strictness burden. See issue #163.
[[tool.pyright.executionEnvironments]]
root = "tests"
reportMissingParameterType = false
reportMissingTypeArgument = false
reportUnknownMemberType = false
reportUnknownVariableType = false
reportUnknownArgumentType = false
reportUnknownLambdaType = false
reportUnknownParameterType = false
reportMissingTypeStubs = false
reportUntypedFunctionDecorator = false
reportPrivateUsage = false
reportUnusedFunction = false
