repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
        exclude: ^Taskfile\.yml$
      - id: check-json
      - id: check-added-large-files
        args: ["--maxkb=500"]

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.11.12
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format

  - repo: local
    hooks:
      - id: biome-check
        name: Biome lint + format check
        entry: pnpm --filter @repo/frontend biome check src/
        language: system
        types_or: [javascript, ts, tsx, json]
        pass_filenames: false

      # Pre-push: run unit tests before code leaves the machine
      - id: pytest-unit
        name: Backend unit tests
        entry: bash -c "cd apps/backend && uv run pytest tests/unit/ -q"
        language: system
        pass_filenames: false
        stages: [pre-push]

      - id: vitest-unit
        name: Frontend unit tests
        entry: bash -c "cd apps/frontend && pnpm vitest run --reporter=dot"
        language: system
        pass_filenames: false
        stages: [pre-push]
