repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
        exclude: ^Taskfile\.yml$
      - id: check-json
      - id: check-added-large-files
        args: ["--maxkb=500"]

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.10
    hooks:
      - id: ruff
      - id: ruff-format

  # pyright is pinned to match apps/backend/uv.lock (guarded by
  # apps/backend/tests/unit/meta/test_precommit_pyright_hook_present.py).
  # Scoped to the pre-push stage because a strict type check across app/
  # scripts/ tests/ is too slow for every commit — same reasoning as the
  # pytest-unit hook below. The hook runs from the repo root and passes
  # staged Python files as args; pyright walks up from each file to
  # discover the per-subproject config (apps/backend/pyproject.toml or
  # packages/error-contracts/pyproject.toml), so both subprojects covered
  # by `task check:types` stay covered here as well.
  - repo: https://github.com/RobertCraigie/pyright-python
    rev: v1.1.408
    hooks:
      - id: pyright
        stages: [pre-push]

  - repo: local
    hooks:
      # Pre-push: run unit tests before code leaves the machine
      - id: pytest-unit
        name: Backend unit tests
        entry: bash -c "cd apps/backend && uv run pytest tests/unit/ -q"
        language: system
        pass_filenames: false
        stages: [pre-push]
