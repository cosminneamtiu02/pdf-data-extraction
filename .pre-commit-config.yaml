repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      # Taskfile.yml is plain YAML (`version: '3'`); the previous
      # `exclude: ^Taskfile\.yml$` was a historical leftover, removed in
      # issue #359. A meta-test at
      # apps/backend/tests/unit/meta/test_precommit_lint_hooks.py pins
      # the invariant that no hook excludes Taskfile.yml.
      - id: check-yaml
      - id: check-json
      - id: check-added-large-files
        args: ["--maxkb=500"]

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.10
    hooks:
      - id: ruff
      - id: ruff-format

  # yamllint catches YAML style drift that `check-yaml` ignores (indentation,
  # trailing whitespace in multi-line strings, duplicate keys at non-top
  # levels). Rules live in `.yamllint` at the repo root.
  - repo: https://github.com/adrienverge/yamllint
    rev: v1.38.0
    hooks:
      - id: yamllint
        args: ["--strict", "-c", ".yamllint"]

  # actionlint statically validates every GitHub Actions workflow under
  # `.github/workflows/`. Catches the class of bug where someone writes
  # `github.actor` expecting `github.event.pull_request.user.login` — see
  # CLAUDE.md's Dependabot auto-merge section for the real-world incident.
  - repo: https://github.com/rhysd/actionlint
    rev: v1.7.12
    hooks:
      - id: actionlint

  # hadolint lints `infra/docker/backend.Dockerfile` for common Dockerfile
  # anti-patterns. We use the `hadolint-py` mirror (not the official
  # `hadolint/hadolint` repo) because upstream only ships a Docker-based
  # pre-commit hook, while `hadolint-py` packages the binary as a Python
  # wheel — matching the "no Docker required in the local dev loop" default.
  - repo: https://github.com/AleksaC/hadolint-py
    rev: v2.14.0
    hooks:
      - id: hadolint
        args: ["--config", ".hadolint.yaml"]

  - repo: local
    hooks:
      # Pre-push: pyright strict across both subprojects, mirroring
      # `task check:types`. Runs through `uv run` so each subproject uses
      # its own environment/interpreter context (apps/backend/.venv,
      # packages/error-contracts/.venv) — otherwise pyright runs from the
      # repo root context (no venv, no pyproject.toml) and fails with
      # reportMissingImports for every third-party import in the monorepo
      # (issue #453, which replaced the earlier
      # `RobertCraigie/pyright-python` entry). Scoped to the
      # pre-push stage because a strict type check across app/ scripts/
      # tests/ is too slow for every commit — same reasoning as the
      # pytest-unit hook below. Version pinning is inherited from each
      # subproject's uv.lock (via `uv run`); there is no separate
      # pre-commit `rev:` to drift. A guardrail in
      # apps/backend/tests/unit/meta/test_precommit_pyright_hook_present.py
      # pins this shape.
      - id: pyright
        name: Pyright strict (backend + error-contracts)
        entry: bash -c "cd apps/backend && uv run pyright app/ scripts/ tests/ && cd ../../packages/error-contracts && uv run pyright"
        language: system
        pass_filenames: false
        stages: [pre-push]

      # Pre-push: run unit tests before code leaves the machine
      - id: pytest-unit
        name: Backend unit tests
        entry: bash -c "cd apps/backend && uv run pytest tests/unit/ -q"
        language: system
        pass_filenames: false
        stages: [pre-push]
